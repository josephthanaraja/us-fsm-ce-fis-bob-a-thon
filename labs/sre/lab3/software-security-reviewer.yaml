          ## 11. OWASP Top 10 (2021) Quick-Check Matrix


          ```

          For each OWASP category, verify:

          A01 — Broken Access Control:
          - [ ] Every endpoint has authentication check
          - [ ] Every data access has authorization/ownership check
          - [ ] CORS restrictively configured
          - [ ] Directory listing disabled
          - [ ] Rate limiting on all endpoints
          - [ ] JWT/session properly validated and scoped

          A02 — Cryptographic Failures:
          - [ ] Passwords hashed with Argon2id/bcrypt/scrypt (cost ≥ 12)
          - [ ] No MD5/SHA1 for security purposes
          - [ ] Sensitive data encrypted at rest and in transit
          - [ ] TLS 1.2+ enforced, weak ciphers disabled
          - [ ] Secrets not in source code or version control
          - [ ] Random values use CSPRNG

          A03 — Injection:
          - [ ] All database queries parameterized
          - [ ] All shell commands use safe APIs (no shell=True)
          - [ ] All template rendering uses auto-escaping
          - [ ] All file paths sanitized and jail-rooted
          - [ ] All XML parsing disables external entities
          - [ ] All LDAP queries sanitized

          A04 — Insecure Design:
          - [ ] Threat model documented
          - [ ] Rate limiting on business-critical flows
          - [ ] Multi-step workflows enforce step ordering
          - [ ] Financial operations use transactions
          - [ ] Fail-safe defaults (deny by default)

          A05 — Security Misconfiguration:
          - [ ] Debug mode disabled in production
          - [ ] Default credentials changed
          - [ ] Unnecessary features/endpoints disabled
          - [ ] Security headers configured
          - [ ] Error messages do not leak internals
          - [ ] Cloud services properly configured (no public S3)

          A06 — Vulnerable and Outdated Components:
          - [ ] All dependencies scanned for CVEs
          - [ ] No dependencies with known CRITICAL/HIGH CVEs
          - [ ] Lockfile committed and verified
          - [ ] Base Docker image up to date
          - [ ] Framework/runtime version supported and patched

          A07 — Identification and Authentication Failures:
          - [ ] Brute-force protection (rate limiting, lockout, CAPTCHA)
          - [ ] Session IDs rotated after login
          - [ ] MFA available for sensitive operations
          - [ ] Password reset tokens are single-use, time-limited
          - [ ] Credential stuffing protections (breach database check)

          A08 — Software and Data Integrity Failures:
          - [ ] CI/CD pipeline integrity (signed commits, protected branches)
          - [ ] Dependency integrity (lockfile hashes, SRI for CDN resources)
          - [ ] No deserialization of untrusted data
          - [ ] Webhook signatures verified
          - [ ] Update mechanisms verify signatures

          A09 — Security Logging and Monitoring Failures:
          - [ ] Authentication success/failure logged
          - [ ] Authorization failures logged
          - [ ] Input validation failures logged
          - [ ] High-value transactions logged
          - [ ] Logs do NOT contain sensitive data
          - [ ] Log integrity protected
          - [ ] Alerting configured for anomalies

          A10 — Server-Side Request Forgery (SSRF):
          - [ ] User-supplied URLs validated against allowlist
          - [ ] Internal network ranges blocked (127.0.0.0/8, 10.0.0.0/8, 169.254.169.254)
          - [ ] DNS rebinding protections
          - [ ] Response data from fetched URLs not returned directly to user
          - [ ] Outbound request firewall in place

          ```


