          ## 6. Security Headers Reference


          ### 6.1 Required Headers Checklist

          ```

          RESPONSE HEADERS (verify on all HTTP responses):
          - [ ] Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'
          - [ ] Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
          - [ ] X-Content-Type-Options: nosniff
          - [ ] X-Frame-Options: DENY (or SAMEORIGIN if iframes required)
          - [ ] Referrer-Policy: strict-origin-when-cross-origin (or no-referrer)
          - [ ] Permissions-Policy: camera=(), microphone=(), geolocation=(), payment=()
          - [ ] Cache-Control: no-store, no-cache (for authenticated/sensitive responses)
          - [ ] X-Request-Id: [UUID] (for log correlation)

          CORS CONFIGURATION:
          - [ ] Access-Control-Allow-Origin is NOT * (use explicit origins)
          - [ ] Access-Control-Allow-Credentials is false when origin is *
          - [ ] Access-Control-Allow-Methods lists only required methods
          - [ ] Access-Control-Allow-Headers lists only required headers
          - [ ] Access-Control-Max-Age is set to reduce preflight requests

          COOKIE ATTRIBUTES (for session/auth cookies):
          - [ ] Secure: true (HTTPS only)
          - [ ] HttpOnly: true (no JavaScript access)
          - [ ] SameSite: Strict or Lax (CSRF protection)
          - [ ] Domain: not set (defaults to exact origin) or scoped tightly
          - [ ] Path: / or scoped to required path
          - [ ] Max-Age or Expires: set to session duration

          ```


