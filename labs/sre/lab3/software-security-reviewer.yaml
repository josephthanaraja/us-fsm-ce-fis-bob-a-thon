          ## 10. Language-Specific Security Patterns


          ### JavaScript / TypeScript

          - Prototype pollution via `Object.assign()`, spread, or `lodash.merge` on user input
          - `eval()`, `Function()`, `setTimeout(string)` with user data
          - `dangerouslySetInnerHTML` without DOMPurify sanitization
          - Missing `await` on auth middleware (async auth check that resolves to truthy Promise)
          - RegExp DoS (ReDoS) from user-controlled regex patterns
          - Insecure deserialization via `node-serialize`, `js-yaml` without safeLoad
          - `child_process.exec()` with user input (prefer `execFile` with array args)
          - Buffer.from() without encoding argument on user input
          - express.static() serving sensitive files (.env, .git)
          - Missing helmet() or equivalent security headers middleware
          - JWT with symmetric secret < 256 bits
          - bcrypt rounds < 10 (recommend 12+)


          ### Python

          - `pickle.loads()` / `yaml.load()` (unsafe loader) on untrusted data
          - `os.system()`, `subprocess.call(shell=True)` with user input
          - Jinja2 templates with `| safe` filter on user data
          - Django `extra()` and `raw()` with string formatting
          - Flask debug mode (`app.run(debug=True)`) in production
          - `eval()`, `exec()`, `compile()` with user-controlled input
          - Missing CSRF middleware in Django/Flask views
          - SQL injection via f-string in raw queries
          - Insecure `tempfile.mktemp()` (use `mkstemp` instead)
          - Weak `SECRET_KEY` in Django settings
          - Missing `SECURE_SSL_REDIRECT`, `SESSION_COOKIE_SECURE` in production


          ### Go

          - `fmt.Sprintf` used to build SQL queries instead of parameterized queries
          - `html/template` vs `text/template` confusion (text/template does NOT escape)
          - Unchecked `err` return from security-critical operations (auth, crypto)
          - `net/http` serving without TLS timeout configuration
          - Missing input validation on path parameters (path traversal)
          - `os/exec.Command` with shell interpretation via `sh -c`
          - CORS middleware configured with wildcard `*`
          - Missing rate limiting on authentication endpoints
          - Goroutine leaks in long-running security handlers
          - JSON unmarshaling into interface{} allowing type confusion


          ### Java / Kotlin

          - JNDI injection (Log4Shell pattern) — `${jndi:ldap://...}` in logged input
          - Deserialization of untrusted objects (ObjectInputStream)
          - Missing `@Valid` on controller method parameters
          - Spring Security filter chain misconfiguration (order matters)
          - Missing CSRF protection on state-changing endpoints
          - SQL injection via JPA `createNativeQuery` with string concatenation
          - XML External Entity (XXE) in DOM/SAX parsers without feature flags
          - Insecure random via `java.util.Random` instead of `SecureRandom`
          - Missing `@Transactional` on financial operations
          - Exposed actuator endpoints without authentication


