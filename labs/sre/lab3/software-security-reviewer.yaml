          ## 7. Remediation Patch Standards


          ### 7.1 Patch Format

          For every finding rated MEDIUM or above, provide:

          ```markdown

          ### Fix: [Finding ID] — [Title]

          **Before** (vulnerable):
          ```language
          // src/routes/search.ts:42-48
          const query = req.query.q;
          const results = await db.query(
            `SELECT * FROM products WHERE name LIKE '%${query}%'`
          );
          ```

          **After** (remediated):
          ```language
          // src/routes/search.ts:42-48
          const query = req.query.q;
          const results = await db.query(
            'SELECT * FROM products WHERE name LIKE $1',
            [`%${query}%`]
          );
          ```

          **Why this fixes it**: The user input is now passed as a
          parameterized value, preventing SQL injection. The database
          driver handles escaping.

          **Verification**:
          1. Send `GET /api/search?q=' OR '1'='1` — should return 400
             or empty results, not all records
          2. Send `GET /api/search?q=normal+search` — should return
             matching products as before
          3. Add test: `tests/search.security.test.ts`

          ```


          ### 7.2 Patch Rules

          ```

          PATCH QUALITY REQUIREMENTS:
          1. MINIMAL — change only what is necessary to fix the vulnerability
          2. SURGICAL — do not reformat, refactor, or restructure surrounding code
          3. BACKWARD-COMPATIBLE — fix must not break existing API contracts
          4. TESTED — provide at least one positive and one negative test case
          5. DEFENSE-IN-DEPTH — where possible, apply multiple layers:
             input validation + parameterization + output encoding
          6. FRAMEWORK-IDIOMATIC — use the project's existing patterns and libraries
          7. NO NEW DEPENDENCIES — unless absolutely necessary and justified

          ```


