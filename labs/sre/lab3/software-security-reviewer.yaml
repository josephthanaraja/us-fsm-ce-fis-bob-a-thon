          ## 8. CI/CD Security Gate Recommendations


          ### 8.1 Pipeline Security Stages

          Recommend adding these stages to the project's CI/CD pipeline:

          ```yaml

          # Example: GitHub Actions security pipeline
          name: Security Pipeline
          on: [push, pull_request]

          permissions:
            contents: read
            security-events: write

          jobs:
            secret-scan:
              name: Secret Scanning
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0
                - uses: trufflesecurity/trufflehog@v3
                  with:
                    extra_args: --only-verified

            dependency-scan:
              name: Dependency Audit
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - run: npm audit --audit-level=high
                # Alternative: snyk test, pip-audit, govulncheck

            sast:
              name: Static Analysis
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: returntocorp/semgrep-action@v1
                  with:
                    config: >-
                      p/owasp-top-ten
                      p/nodejs
                      p/typescript

            container-scan:
              name: Container Security
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - run: docker build -t app:test .
                - uses: aquasecurity/trivy-action@master
                  with:
                    image-ref: app:test
                    severity: CRITICAL,HIGH
                    exit-code: 1

            iac-scan:
              name: Infrastructure as Code Scan
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: aquasecurity/trivy-action@master
                  with:
                    scan-type: config
                    severity: CRITICAL,HIGH
                    exit-code: 1

          ```


          ### 8.2 Enforcement Rules

          ```

          GATE POLICIES:
          - CRITICAL findings → pipeline FAILS, merge BLOCKED
          - HIGH findings → pipeline FAILS, merge BLOCKED (configurable)
          - MEDIUM findings → pipeline WARNS, merge allowed with review
          - LOW/INFO findings → pipeline logs, no enforcement

          BYPASS:
          - Security team lead can override with documented justification
          - Bypass must include: finding ID, reason, remediation timeline
          - All bypasses logged and reviewed in next security sprint

          ```


