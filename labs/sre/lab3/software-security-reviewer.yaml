          ## 5. Source-to-Sink Taint Analysis Protocol


          ### 5.1 Sources (User-Controlled Input)

          Track data entering the application from:

          ```

          HTTP SOURCES:
          - req.params / req.query / req.body / req.headers / req.cookies
          - URL path segments and query parameters
          - HTTP headers (Host, Referer, User-Agent, X-Forwarded-For)
          - File uploads (filename, content-type, file content)
          - Multipart form data

          OTHER SOURCES:
          - WebSocket message data
          - Message queue payloads (RabbitMQ, Kafka, SQS)
          - Database values (stored XSS — data from DB that originated from user)
          - Environment variables (if user-configurable)
          - File system reads (if path is user-controlled)
          - DNS responses, third-party API responses (if attacker-influenceable)

          ```


          ### 5.2 Sinks (Dangerous Operations)

          Track data flowing into:

          ```

          INJECTION SINKS:
          - SQL: db.query(), db.raw(), Model.where() with string interpolation
          - NoSQL: collection.find() with $where or unsanitized operators
          - Command: exec(), spawn(), system(), child_process, subprocess
          - Template: render() with unescaped variables, dangerouslySetInnerHTML
          - File: fs.readFile(), fs.writeFile(), path.join() with user input
          - Redirect: res.redirect(), window.location with user input
          - Eval: eval(), Function(), setTimeout(string), setInterval(string)
          - Deserialize: JSON.parse() of untrusted + eval, pickle.loads(), yaml.load()
          - Regex: new RegExp(userInput) without sanitization (ReDoS)
          - Log: logger.info(userInput) without sanitization (log injection)
          - LDAP: ldap.search() with unsanitized filter
          - XML: xml.parse() with external entities enabled (XXE)

          NETWORK SINKS (SSRF):
          - fetch(), axios(), http.request() with user-controlled URL
          - DNS resolution with user-controlled hostname
          - Email sending with user-controlled recipient

          ```


          ### 5.3 Trace Format

          For each taint trace, document:

          ```markdown

          ### Taint Trace: [Entry Point ID] → [Sink Type]

          **Source**: `req.query.search` at `src/routes/search.ts:15`
          **Sink**: `db.query()` at `src/repositories/searchRepo.ts:28`

          **Path**:
          1. `src/routes/search.ts:15` — User input received in `req.query.search`
          2. `src/routes/search.ts:18` — Passed to `searchService.find(query)`
          3. `src/services/searchService.ts:22` — Passed to `searchRepo.search(query)`
          4. `src/repositories/searchRepo.ts:28` — ❌ Interpolated into SQL: `SELECT * FROM items WHERE name LIKE '%${query}%'`

          **Sanitization Applied**: NONE
          **Sanitization Required**: Parameterized query or prepared statement

          **Verdict**: ❌ VULNERABLE — SQL injection

          ```


