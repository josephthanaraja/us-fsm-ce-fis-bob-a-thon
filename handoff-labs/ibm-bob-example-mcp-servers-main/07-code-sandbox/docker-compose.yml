# Use with podman-compose: podman-compose up -d
version: '3.8'

services:
  code-sandbox:
    build: .
    container_name: code-sandbox-mcp
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - SANDBOX_TIMEOUT=30
      - SANDBOX_MAX_OUTPUT=1048576
    mem_limit: 256m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /sandbox:uid=1000,gid=1000
    restart: unless-stopped

